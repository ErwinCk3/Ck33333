 # ══════════════════════════════════════════════════════
 # GECE ZİYARETÇİSİ
 # ══════════════════════════════════════════════════════

 carn_ext.0401.t: "Karanlıkta Bir Şey"
 carn_ext.0401.desc: |
  Saat derinleşmişti — yalnızca gecenin ortasında gelen,
  nöbetçilerin bile uyuklamasına izin veren türden bir karanlık.
  #newline#newline
  [Root.GetFirstName] uyumuyordu.
  Uyku son zamanlarda ele geçmez olmuştu —
  beklenmedik belirsizlikte dolaşıp duruyordu.
  #newline#newline
  Sonra kapı hareket etti.
  #newline#newline
  Yavaşça. Sessizce. Açmak için uzun süre çok dikkatli
  biri tarafından açılan kapı gibi.
  #newline#newline
  Odada biri vardı.

 carn_ext.0401.shout: "Kim var orada! Muhafızlar!"
 carn_ext.0401.wait: "Kıpırdamadım. Hareketsiz yattım ve dinledim."
 carn_ext.0401.weapon: "Elim yastığın altındaki hançere uzandı."
 carn_ext.0401.greet: "Kim olursan ol — içeri gir."

 carn_ext.0402.t: "Işık Yok"
 carn_ext.0402.desc_default: |
  [Root.GetFirstName] göremiyordu.
  #newline#newline
  Ateş közlere dönmüştü — yeterli sıcaklık, yeterli ışık değil.
  Bir varlık vardı. Bir şekil. Kendi nefesinden farklı bir nefes sesi.
  #newline#newline
  Bir tehdit değildi — ya da öyleyse, olağandışı derecede sabırlı biriydi.
  Odadaki her ne ise hareketi bırakmıştı ve yalnızca orada duruyordu,
  sanki kabul edilmeyi bekliyordu.

 carn_ext.0402.ask: "Bana kim olduğunu söyle."
 carn_ext.0402.accept: "Kimin olduğu önemli değildi artık. Oradaydı. Bu yeterliydi."
 carn_ext.0402.refuse: "Hayır. Kim olursan ol — git. Şimdi."

 carn_ext.0403.t: "İlk Işık"

 carn_ext.0403.desc_spouse: |
  İlk gri ışık kepenklerden ince şeritler halinde süzüldü —
  yavaş ve kaçınılmaz.
  #newline#newline
  [Root.GetFirstName] döndü.
  #newline#newline
  [Primary_Spouse.GetFirstName].
  #newline#newline
  Gözleri zaten açıktı — [Root.GetHimHer]'e bir ifadeyle bakıyordu
  ki okumak zordu. Eğlence ile çok daha ciddi bir şey arasında bir yerde.
  #newline#newline
  "Bilmiyordun," dedi sessizce. Soru sormuyordu.
  #newline#newline
  [Root.GetFirstName] evliliklerinin tüm yıllarını düşündü.
  "Hayır," dedi [Root.GetFirstName]. "Bilmiyordum."
  #newline#newline
  [Primary_Spouse.GetFirstName] gülümsedi. Yavaş, sessiz, gerçek.
  "İyi," dedi. "Amaç buydu."

 carn_ext.0403.desc_servant: |
  Işık geldi. Ve birlikte tanıma da.
  #newline#newline
  [Root.GetFirstName] yastıktaki yüze baktı ve hızla
  ardı ardına karmaşık duygular yaşadı.
  #newline#newline
  Kendi hanesinin bir üyesi.
  Şarap döken, danışma toplantılarında sessizce
  arkasında duran, iyi eğitilmiş hizmetkarların görünmez olduğu gibi görünmez olan biri.
  #newline#newline
  Şimdi görünmez değildi.
  #newline#newline
  "Efendim," dedi [Scope:carn_ext_nv_revealed.GetFirstName], sesi tamamen sakin.
  "Günaydın."

 carn_ext.0403.desc_rival: |
  [Root.GetFirstName] daha önce hatalar yapmıştı.
  Siyasi yanlış hesaplamalar. Taktik hatalar.
  Bir odayı yanlış okuduğu danışma anları.
  #newline#newline
  Bu farklıydı. Bu —
  #newline#newline
  [Scope:carn_ext_nv_revealed.GetFirstName].
  #newline#newline
  Tüm saraydaki insanlar arasında. Olası ziyaretçiler listesinde
  bu yüz olmazdı. Bu yüz bir düşmandı.
  #newline#newline
  [Scope:carn_ext_nv_revealed.GetFirstName] nazikçe sordu:
  "Şaşırdınız mı?"

 carn_ext.0403.desc_family: |
  [Root.GetFirstName] gerçeği ışık gelmeden önce bildi.
  #newline#newline
  Bazı şeyler, akıl kabul etmeye hazır olmadan önce
  beden tarafından bilinir. Bu kişinin özel nefes biçimi.
  Bin kez ateş ışığında görülmüş, bu ana kadar
  fark edilmemiş bir jest.
  #newline#newline
  Işık geldi. [Root.GetFirstName]'in zaten bildiğini teyit etti.
  #newline#newline
  [Scope:carn_ext_nv_revealed.GetFirstName] uyanıktı.
  Uzun süre konuşmadan birbirlerine baktılar.

 carn_ext.0403.desc_stranger: |
  [Root.GetFirstName] bu yüzü tanımıyordu.
  #newline#newline
  Görmüştü belki — bir koridorda, bir yemekte,
  bir saraydan geçen ve fazla iz bırakmayan
  yüzlerden biri. Ama tanımıyordu.
  #newline#newline
  [Scope:carn_ext_nv_revealed.GetFirstName] bundan hiç rahatsız görünmüyordu.
  Sessizce giyindi — ve sonra durdu.
  Döndü. [Root.GetFirstName]'e baktı.
  #newline#newline
  "Kim olduğumu öğrenmek isteyeceksiniz," dedi.
  "Sorup sormamak size kalmış."

 carn_ext.0403.spouse_touched: "Siz miydiniz? Bütün bu zaman — siz miydiniz?"
 carn_ext.0403.spouse_transcendent: "Yıllardır evliyiz ve bunu hiç bilmiyordum."
 carn_ext.0403.spouse_surprised: "Siz... bunu planladınız mı?"
 carn_ext.0403.default: "Sabah her şeyi değiştirdi."

 carn_ext.0408.t: "Yapılanın Ağırlığı"
 carn_ext.0408.desc: |
  Günün tam ışığında, saray işleri yeniden devam ederken,
  [Root.GetFirstName] [Scope:carn_ext_nv_revealed.GetFirstName]'in
  odada hareket etmesini izledi.
  #newline#newline
  Yine görünmez. Profesyonel. Doğru her hareket.
  #newline#newline
  Yalnızca bir anda — sadece bir kez —
  [Scope:carn_ext_nv_revealed.GetFirstName] yakından geçti ve yukarı baktı.
  #newline#newline
  O bakış. [Root.GetFirstName] bu bakışı bir süre düşünecekti.

 carn_ext.0408.continue: "Bu gece de gel."
 carn_ext.0408.distance: "Bu bir daha olmamalı."
 carn_ext.0408.threaten: "Bunu kimseye söylemeyeceksin. Hiçbir zaman. Asla."

 carn_ext.0409.t: "Tehlikeli Bir Oyun"
 carn_ext.0409.desc: |
  [Scope:carn_ext_nv_revealed.GetFirstName] aceleyle gitmemişti.
  Bu ilk uyarı işaretiydi.
  #newline#newline
  Giderken kapıda durdu ve gülümsedi — sıcak değil.
  Sıcaklıktan daha keskin bir şey.
  #newline#newline
  "Bilmelisiniz," demişti, "her şeyi hatırlıyorum."
  #newline#newline
  Kapı kapandı. [Root.GetFirstName] durdu ve ne olduğunu
  ve ne kadar büyük belada olduğunu anladı.

 carn_ext.0409.negotiate: "Sessizliğiniz için ne istiyorsunuz?"
 carn_ext.0409.eliminate: "Bu kişinin konuşmasına izin verilemez."
 carn_ext.0409.accept_blackmail: "Başka seçeneğim yok."

 carn_ext.0410.t: "Bir İsim"
 carn_ext.0410.desc: |
  [Root.GetFirstName] adını sabahın ortasında öğrendi —
  bir kâhyadan geçerken duydu.
  #newline#newline
  [Scope:carn_ext_nv_revealed.GetFirstName].
  #newline#newline
  Bu kadar sıradan bir isim. Gece hakkında bu kadar az şey açıklayan.
  #newline#newline
  Holün karşısında [Scope:carn_ext_nv_revealed.GetFirstName]
  [Root.GetHisHer] gözüyle temas kurdu
  ve tam bir yabancının yapmaması gereken kadar uzun tuttu.

 carn_ext.0410.investigate: "Kim olduğunu öğrenmem gerekiyor."
 carn_ext.0410.forget: "Bir isim. Hepsi bu. Bir anlam ifade etmiyor."
 carn_ext.0410.invite_again: "Geri gel."

 # ══════════════════════════════════════════════════════
 # SAVAŞ YATAĞI
 # ══════════════════════════════════════════════════════

 carn_ext.0501.t: "Dikkat Çeken Bir Esir"

 carn_ext.0501.desc_female_prisoner: |
  Savaş bitmişti. Alan temizleniyordu.
  Ve [Root.GetFirstName] [Scope:carn_ext_wb_prisoner.GetFirstName]'i fark etti.
  #newline#newline
  Diğer esirler arasında duruyordu —
  sinmiş değil, ağlamıyor değil, sadece duruyordu.
  Daha sonra, özel olarak korkmaya karar veren
  birinin özel dinginliğiyle.
  #newline#newline
  Bir düşman. Bir esir. [Root.GetFirstName] düzinelercesini almıştı.
  Bu biri farklıydı.

 carn_ext.0501.desc_male_prisoner: |
  Kolayca düşürülmemişti. [Root.GetFirstName]'in üç askeri
  onu dizlerinin üstüne indirmek zorunda kalmıştı.
  Diz çökmüş halde bile geçici olarak engellenen biri gibi görünüyordu.
  #newline#newline
  [Root.GetFirstName] onun önünde durdu ve adam yukarı baktı —
  korku ya da yalvarmayla değil, düz bir bakışla:
  #italic Yüzünü ezberleyeceğim.#!
  #newline#newline
  Bir düşman. [Root.GetFirstName] bunu kendine hatırlattı.

 carn_ext.0501.standard: "Fidye için sakla. Özel bir şey yok."
 carn_ext.0501.examine: "Bekle. Bunu bana ayrı getirin."
 carn_ext.0501.special: "Bu esiri çadırımın yakınında tut."

 carn_ext.0502.t: "İkinci Bakış"
 carn_ext.0502.desc_female: |
  [Root.GetFirstName] kendine pratik bir ziyaret olduğunu söyledi.
  Düşman mevzileri hakkında sorular. İstihbarat.
  Meşru askeri iş.
  #newline#newline
  [Scope:carn_ext_wb_prisoner.GetFirstName] [Root.GetHeShe] girdiği andan itibaren
  baktı ve [Root.GetFirstName] meşru askeri işinin ne olduğunu
  tamamen unuttu.

 carn_ext.0502.retreat: "Burada olmam gereken bu değil. Gitmeliyim."
 carn_ext.0502.talk: "Konuştuk. Önce savaş hakkında. Sonra başka şeyler hakkında."
 carn_ext.0502.touch: "Uzandım. Çenesini tuttu elimle. Düşman. Güzel düşman."

 carn_ext.0505.t: "Dönüş Noktası"
 carn_ext.0505.desc_breaking: |
  [Root.GetFirstName] dönüş noktasının nasıl göründüğünü
  bilecek kadar uzun yeterince komutanlık yapmış.
  Geri dönmenin ilerlemekten tehlikeli hale geldiği
  o an — savaşta ona doğru onlarca kez sürmüştü.
  #newline#newline
  Tam bu gibiydi.
  #newline#newline
  [Scope:carn_ext_wb_prisoner.GetFirstName] [Root.GetFirstName]'in
  nefesini duyabilecek kadar yakındı.
  Dışarıda kamp sıra dışı gece sesleri çıkarıyordu.
  İçeride: sadece ikisi.

 carn_ext.0505.stop: "Hayır. Bu neyse — burada bitiyor."
 carn_ext.0505.dominant: "Sen benim esirimsın. Ve bu gece benimsin."
 carn_ext.0505.mutual: "Bunu açıklayamıyorum. Durduramıyorum."
 carn_ext.0505.prisoner_takes_lead: "'Sizi istiyorum,' dedi. Bana. Açıkça."

 carn_ext.0506.t: "Çadır"
 carn_ext.0506.desc_mutual: |
  Tören yoktu. Müzakere yoktu.
  Bir savaşın ortasında bir çadırda iki insan —
  tüm bağlam soyulup atılmış, geriye kalan şey
  sadece buydu.
  #newline#newline
  Düşman. Esir tutan. Esir.
  Bu kelimelerin hiçbiri artık tam doğru değildi.
  [Root.GetFirstName] doğru kelimelerin ne olduğunu söyleyemezdi.
  Yalnızca yanlış olanların artık önemli hissettirmediğini.

 carn_ext.0506.transcendent: "Bir savaş çadırında. Bir düşmanla. Hatırladığım en iyi gece."
 carn_ext.0506.deeply: "Sabah olduğunda hâlâ gitmesini istemedim."
 carn_ext.0506.guilty: "Bir düşman. Tanrım. Ne yaptım?"
 carn_ext.0506.default: "Savaş insanlara şeyler yapar. Bu da onlardan biri."

 carn_ext.0507.t: "Savaş Bitiyor"
 carn_ext.0507.desc_war_ended: |
  Savaş bitmişti. Bir tür barış gelmişti.
  #newline#newline
  Bu da [Scope:carn_ext_wb_prisoner.GetFirstName]'in
  tam olarak bir esir olmadığı anlamına geliyordu artık.
  Yasal zemin kaymıştı.
  Basit yapan tanımlar — esir tutan, tutuklu, zincirlerin netliği —
  çözülüyordu.
  #newline#newline
  [Root.GetFirstName] [Scope:carn_ext_wb_prisoner.GetFirstName]'e baktı
  ve savaş olarak başlayıp gecelerde başka bir şeye dönüşen
  bu şeyle ne yapacağına karar vermeye çalıştı.

 carn_ext.0507.release: "Git. Savaş bitti. Bu da öyle."
 carn_ext.0507.keep: "Benimle geri dön. Esir olarak değil."
 carn_ext.0507.ransom: "Siyaset siyasettir. Fidyeyi al."

 carn_ext.0508.t: "Sonrasına Ne Gelir"
 carn_ext.0508.desc: |
  [Root.GetFirstName] teklifi sunduktan sonra
  [Scope:carn_ext_wb_prisoner.GetFirstName] uzun süre sessiz kaldı.
  #newline#newline
  Sonra: "Sarayın."
  Soru değil. [Root.GetFirstName] başını salladı.
  #newline#newline
  "Ve sen." Yine soru değil. Bir envanter.
  "Evet," dedi [Root.GetFirstName].
  #newline#newline
  [Scope:carn_ext_wb_prisoner.GetFirstName] giden savaşa, öndeki yola baktı.
  Sonra geri döndü.
  #newline#newline
  "Peki," dedi.

 carn_ext.0508.accept: "Bir düşman ki artık adlandıramıyorum."

 carn_ext.0509.t: "Gitti"
 carn_ext.0509.desc: |
  [Root.GetFirstName] bunu bir yüzbaşıdan duydu —
  savaşta ölümlerin iletildiği düz, verimli dille,
  ağırlık veya tören olmadan.
  #newline#newline
  [Scope:carn_ext_wb_prisoner.GetFirstName].
  Ölü. Savaşta.
  #newline#newline
  [Root.GetFirstName] bir an durdu.
  Yüzbaşı bekledi, sonra devam etti — başka raporlar vardı,
  başka isimler, başka ölümler, sonrasının olağan işleri.
  #newline#newline
  [Root.GetFirstName] biraz daha bekledi.
  Bir esirin ölümüne verilen uygun tepkiyi bulmaya çalıştı.
  Bunun yerine bambaşka bir şey buldu.

 carn_ext.0509.grieve: "Bir düşmana yas tutmak. Tuhaf. Gerekli."
 carn_ext.0509.soldier: "Savaş insanları alır. Savaşın yaptığı budur."

 # ══════════════════════════════════════════════════════
 # SARAY SKANDALI — Kısa Seçenekler
 # ══════════════════════════════════════════════════════

 carn_ext.0604.report: "İhbar et. Adaleti işlesin."
 carn_ext.0604.blackmail: "Bu sırrın bir bedeli var."
 carn_ext.0604.keep_secret: "Hiçbir şey söylemeyeceğim. Ama borçlu olacaklar."
 carn_ext.0604.join: "Ben de dahil olmak istiyorum."

 carn_ext.0608.threesome: "Kapı kapandı. Gece başladı."
 carn_ext.0608.decline: "Düşününce — hayır. Böyle istemiyorum."

 carn_ext.0609.continue_threesome: "Bu gece herkes istediğini aldı."
 carn_ext.0609.steal_her: "Onu istiyorum. Yalnızca onu. Çekil."

 carn_ext.0610.send_away: "Çıkabilirsin artık."
 carn_ext.0610.force_watch: "Kal. Hepsini izleyeceksin."

 # ══════════════════════════════════════════════════════
 # DİN ADAMININ GÜNAHI — Kısa Seçenekler
 # ══════════════════════════════════════════════════════

 carn_ext.0701.reject: "Bugün ruhani rehberliğe ihtiyacım yok. Teşekkürler."
 carn_ext.0701.listen: "Devam edin. Merak içindeyim... gerçekten ilgilendim."
 carn_ext.0701.approach: "Burada ilahiyatın ötesinde bir şey oluyor."

 carn_ext.0704.stop: "Hayır. İkimiz de bunun ne olduğunu ve yapamayacağımızı biliyoruz."
 carn_ext.0704.proceed: "Tanrı'nın hükmü neyse... şu an umurumda değil."

 carn_ext.0705.deny: "Bu hiç olmadı. İkimiz de bunu asla konuşmayacağız."
 carn_ext.0705.confess: "Yaşananın gerçeğini söylemeliyiz."
 carn_ext.0705.again: "Dün gece bir son değildi. Bir başlangıçtı."

 carn_ext.0707.accept: "Her hafta. Her neyse bu — devam etsin."
 carn_ext.0707.end: "Bu devam edemez. Burada, şimdi bitiriyorum."

 carn_ext.0709.continue: "Risk olsa da devam edeceğim."
 carn_ext.0709.end: "Artık çok tehlikeli. Şimdi bitirmeliyim."

 # ══════════════════════════════════════════════════════
 # KRALIN FAVORİSİ — Kısa Seçenekler
 # ══════════════════════════════════════════════════════

 carn_ext.0801.reject: "Bu oyunun kurallarına uymak istemiyorum."
 carn_ext.0801.approach: "Kendimi görünür kılacağım. Gerekli hale getireceğim."
 carn_ext.0801.aggressive: "Incelik harcamamam gereken zamanı alıyor."

 carn_ext.0802.reject: "Bir favoriye ihtiyacım yok. Uzak dur."
 carn_ext.0802.consider: "İlginç. Önerdiğin şey hakkında daha fazla anlat."
 carn_ext.0802.accept: "Evet. Bu gece gel."

 carn_ext.0804.transcendent: "Güç ve zevk aynı anda. Buna alışabilirim."
 carn_ext.0804.deeply: "Umut verici bir başlangıç. Daha öğrenilecek çok şey var."
 carn_ext.0804.political: "Zevk yan ürün. Güç asıl mesele."
 carn_ext.0804.default: "Oyun başladı."

 carn_ext.0805.crush: "Bu rakibi sorun haline gelmeden yok edeceğim."
 carn_ext.0805.compete: "Neden ilk beni seçtiklerini hatırlatayım."
 carn_ext.0805.retreat: "Oyun çok pahalıya geliyor. Bittim."
 carn_ext.0805.share: "Belki üçüncü bir yol vardır. Hep birlikte müzakere edelim."

 carn_ext.0807.embrace: "Güç en eksiksiz olduğunda aynı zamanda kişiseldir."
 carn_ext.0807.careful: "Buna sahip olmak değerli. Dikkatsizce kaybetmemeliyim."

 carn_ext.0808.accept: "Bu turu kaybettim. Savaşı değil."
 carn_ext.0808.revenge: "Bu rakip buna pişman olacak."

 carn_ext.0809.accept: "Oyun burada bitiyor."
 carn_ext.0809.fight: "Yerimi bırakmaya hazır değilim."

 carn_ext.0810.survive: "Hayatta kaldım. Şimdi bunun hesabını soracağım."
 carn_ext.0810.flee: "Bu pozisyon hayatıma değmez."
