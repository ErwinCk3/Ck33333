 carn_ext_opinion_traumatic: "Travmatik Deneyim"
 carn_ext_opinion_bad_lover: "Hayal Kırıklığı Yaratan Aşık"
 carn_ext_opinion_unsatisfied: "Tatminsiz Bırakıldı"
 carn_ext_opinion_deep_satisfaction: "Derinden Tatmin Eden Aşık"
 carn_ext_opinion_transcendent: "Unutulmaz Aşık"

 # ── MODIFIER ADLARI ──────────────────────────────────────────────────────────

 carn_ext_afterglow: "Sonraki Işık"
 carn_ext_afterglow_desc: "Derinden tatmin edici bir karşılaşmanın verdiği dinginlikle parlıyor. Stres uzak hissettiriyor."
