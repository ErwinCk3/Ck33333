l_turkish:

 # ── carn_ext.0010 — Masum → Meraklı ─────────────────────────────────────────

 carn_ext.0010.t: "Bir Uyanış"
 carn_ext.0010.desc: |
  Bir şeyler değişti.
  #newline
  [Root.GetFirstName] bu hissi tam olarak adlandıramıyor —
  yalnızca dünyanın artık farklı göründüğünü biliyor.
  Bazı yerlerde daha yumuşak. Bazı yerlerde daha keskin.
  Bir zamanlar doğal gelen masumiyet artık
  eskisi kadar rahat oturmuyor.
  #newline
  Öğrenilecek çok şey var. Ve [Root.GetFirstName] ilk kez
  gerçekten meraklı hissediyor.

 carn_ext.0010.a: "Bilmediğim çok şey varmış..."

 # ── carn_ext.0011 — Meraklı → Deneyimli ─────────────────────────────────────

 carn_ext.0011.t: "Güvenli Bir Adım"
 carn_ext.0011.desc: |
  Deneyimin insanı içten dışa şekillendirme biçimi vardır.
  #newline
  [Root.GetFirstName] artık farklı hareket ediyor —
  başkalarının açıklayamadığı ama fark ettiği sessiz bir özgüvenle.
  İlk karşılaşmaların acemi belirsizliği yerini
  daha bilinçli, daha kararlı bir şeye bırakmış.
  #newline
  Ne istediğini biliyor. Ve bunu nasıl isteyeceğini de.

 carn_ext.0011.a: "Artık ne istediğimi biliyorum."

 # ── carn_ext.0012 — Deneyimli → Yozlaşmış ───────────────────────────────────

 carn_ext.0012.t: "Aşılan Sınır"
 carn_ext.0012.desc: |
  [Root.GetFirstName] tam olarak ne zaman olduğundan emin değil —
  iştahın daha karanlık bir şeye dönüştüğü an.
  #newline
  Bir zamanlar tatmin eden karşılaşmalar artık yetersiz geliyor.
  Bir zamanlar sabit sanılan sınırlar çok daha esnek olduğunu kanıtladı.
  #newline
  Rahipler lahnetten söz eder. [Root.GetFirstName] ise
  onların tatmadıklarını düşünüyor.

 carn_ext.0012.a: "Geri dönüş yok. İstesem de gidemezdim."
 carn_ext.0012.b: "Belki çok ileri gittim. Daha dikkatli olmalıyım."

 # ── carn_ext.0013 — Yozlaşmış → Libertine ───────────────────────────────────

 carn_ext.0013.t: "Utancın Ötesinde"
 carn_ext.0013.desc: |
  Utanç, başarısız olunan bir standardı gerektirir.
  [Root.GetFirstName] o standardı tanımayı bıraktı.
  #newline
  Başkalarının günah dediğine [Root.GetHeShe] felsefe der.
  Beden boyunduruk altına alınacak bir kafes değil —
  ustalık gerektiren bir enstrüman. Ve [Root.GetFirstName]
  bir virtüöze dönüşmek üzere.
  #newline
  Tanrılar varsa mutlaka izliyorlardır.

 carn_ext.0013.a: "Bedenin yasası tek kanun olarak tanıdığım yasa."
 carn_ext.0013.b: "Şimdi bile... daha iyisine bir yol var mı?"

 # ── carn_ext.0032 — Yakıcı Libido, 60 gün ───────────────────────────────────

 carn_ext.0032.t: "Bekleyemeyen Bir Açlık"
 carn_ext.0032.desc: |
  Günler dayanılmaz bir şeye dönüştü.
  #newline
  [Root.GetFirstName] danışma kurulunda dalgın, sofrada
  sinirli ve geceleri huzursuz bulunuyor —
  siyasi bir çözümü olmayan bir kıpırdamayla uyanık yatıyor.
  #newline
  Bu açlık artık akılla müzakere edilebilir bir şey değil.
  Tatmin istiyor — ve saray olası karşılaşmalarla dolu.

 carn_ext.0032.a: "Bu gece birini bulacağım. Böyle devam edemem."
 carn_ext.0032.b: "Hayır. Ben iştahlarımdan daha fazlasıyım. Dayanacağım."
 carn_ext.0032.c: "Bunu sessizce, kendi başıma hallederim."

 # ── carn_ext.0050 — Bağımlılık Başlangıcı ───────────────────────────────────

 carn_ext.0050.t: "Bir Şeyler Değişti"
 carn_ext.0050.desc: |
  Aşk değil — [Root.GetFirstName] bunu görüyor.
  #newline
  Ama ne olursa olsun, beklenenin çok daha derinlerine işledi.
  O karşılaşmaların anısı, uzaklaştırmak istediği
  bir ısrarcılıkla direnç gösteriyor.
  #newline
  [Root.GetFirstName] bir sonraki buluşmaya ne kadar kaldığını
  hesapladığını fark ediyor. Hiç gelmezse ne yapacağını merak ediyor.
  #newline
  Bu düşünce beklediğinden çok daha korkutucu.

 carn_ext.0050.a: "Bu tür bir ihtiyaca hiç savunmam olmadı."
 carn_ext.0050.b: "Bu tehlikeli. Aramıza mesafe koymalıyım."

 # ── Interaction ──────────────────────────────────────────────────────────────

 CARN_EXT_SPEND_NIGHT_NAME: "Geceyi Birlikte Geçir"
 CARN_EXT_SPEND_NIGHT_NAME_desc: |
  [Scope:Recipient.GetFirstName]'i seninle
  geceyi geçirmeye davet et.
  #newline
  #bold Bekleme Süresi:#! 1 gün.

 CARN_EXT_APPROACH_ROMANTIC_OPTION: "Nazikçe"
 CARN_EXT_APPROACH_ROMANTIC_OPTION_desc: "Yumuşak, romantik bir yaklaşım."

 CARN_EXT_APPROACH_DOMINANT_OPTION: "Dominant Olarak"
 CARN_EXT_APPROACH_DOMINANT_OPTION_desc: "Kimin kontrolde olduğunu açıkça ortaya koy."

 CARN_EXT_APPROACH_SUBMISSIVE_OPTION: "Boyun Eğerek"
 CARN_EXT_APPROACH_SUBMISSIVE_OPTION_desc: "Kendini tamamen onun iradesine bırak."

 CARN_EXT_SPEND_NIGHT_ACTOR_MSG: |
  [Scope:Recipient.GetFirstName]'i seninle
  geceyi geçirmeye davet ettin.

 CARN_EXT_SPEND_NIGHT_RECIPIENT_MSG: |
  [Scope:Actor.GetFirstName] seni
  birlikte gece geçirmeye davet etti.

 CARN_EXT_SPEND_NIGHT_DECLINE_MSG: |
  [Scope:Recipient.GetFirstName] davetini reddetti.
