# ==============================================================================

l_turkish:

 # ── ERKEK VÜCUT YAPISI ───────────────────────────────────────────────────────

 carn_ext_build_lean: "İnce Yapı"
 carn_ext_build_lean_desc: |
  İnce, kıvrak bir çerçeve — hareketlerde hafif ve hızlı,
  ama uzun çaba için yapılmamış.
  #newline
  #bold Çatışma Gücü:#! #negative -1#!

 carn_ext_build_average: "Ortalama Yapı"
 carn_ext_build_average_desc: |
  Ne dikkat çekici ne de eksik dengeli bir fizik.
  Saray ve sefer gereksinimlerine eşit ölçüde uygun.

 carn_ext_build_muscular: "Kaslı Yapı"
 carn_ext_build_muscular_desc: |
  Hem büyük salonda hem yatak odasında dikkatleri çeken
  güçlü ve gelişmiş bir çerçeve.
  #newline
  #bold Çatışma Gücü:#! #positive +2#!
  #newline
  #bold Stamina Bonusu:#! Yakın karşılaşmalarda aktif.
  #newline
  #bold Çekim:#! #positive +10#!

 carn_ext_build_massive: "Dev Yapı"
 carn_ext_build_massive_desc: |
  Herhangi bir kılıç kadar yıldırıcı olabilen,
  gerçekten görkemli bir fizik. Partnerler bunaltılmış hissedebilir.
  #newline
  #bold Çatışma Gücü:#! #positive +3#!
  #newline
  #bold Çekim:#! #positive +12#!
  #newline
  #negative Diplomasi:#! -1 (yıldırıcı görünüm)

 # ── KADIN GÖĞÜS BOYUTU ──────────────────────────────────────────────────────

 carn_ext_bust_small: "Mütevazı Göğüs"
 carn_ext_bust_small_desc: |
  İnce, dikkat çekmeyen bir figür. Zarif ve özgür —
  bazıları bu rafine zarafeti derinden çekici bulur.

 carn_ext_bust_average: "Ortalama Göğüs"
 carn_ext_bust_average_desc: |
  Gereğinden fazla dikkat çekmeden göze hoş gelen,
  dengeli bir figür.

 carn_ext_bust_large: "Dolgun Göğüs"
 carn_ext_bust_large_desc: |
  Sarayda baş çeviren, göz alıcı ve cömert bir figür.
  Diplomaside de yakınlıkta da bir avantaj.
  #newline
  #bold Çekim:#! #positive +8#!

 carn_ext_bust_ample: "Bol Göğüs"
 carn_ext_bust_ample_desc: |
  Gerçekten dikkat çekici bir figür — herhangi bir ortamda göz ardı edilemez.
  Varlığı istese de istemese de dikkati çeker.
  #newline
  #bold Çekim:#! #positive +15#!
  #newline
  #italic Bazen istenmeyen ilgiye yol açabilir.#!

 # ── KADIN KALÇA/FORM ────────────────────────────────────────────────────────

 carn_ext_hips_slim: "İnce Kalça"
 carn_ext_hips_slim_desc: |
  Zarif hareketleriyle göz alıcı ince bir çerçeve;
  ama doğum biraz daha riskli.
  #newline
  #negative Doğum Riski:#! Hafifçe yüksek.

 carn_ext_hips_curved: "Kıvrımlı Figür"
 carn_ext_hips_curved_desc: |
  Çoğu sarayda kadınlık güzelliğinin ideali sayılan,
  dengeli ve biçimli bir figür.
  #newline
  #bold Çekim:#! #positive +8#!

 carn_ext_hips_full: "Dolgun Figür"
 carn_ext_hips_full_desc: |
  Canlılık ve sağlığı yansıtan geniş, cömert kalçalar.
  Şairler ve hekimler bu figürü olağanüstü doğurganlık
  ve gücün işareti sayar.
  #newline
  #bold Çekim:#! #positive +15#!
  #newline
  #bold Doğum:#! #positive Azaltılmış risk#!
  #newline
  #bold Yakınlık Bonusu:#! Karşılaşma hesaplamalarında aktif.

 # ── DOĞURGANLIK ─────────────────────────────────────────────────────────────

 carn_ext_fertility_low: "Düşük Doğurganlık"
 carn_ext_fertility_low_desc: |
  Gebe kalmak zorlu ve nadir. Hekimlerin doğanın
  esirgediklerine pek çaresi yoktur.
  #newline
  #bold Doğurganlık:#! #negative -%20#!

 carn_ext_fertility_normal: "Normal Doğurganlık"
 carn_ext_fertility_normal_desc: |
  Çocuk doğurma konusunda sağlıklı ve tipik bir kapasite —
  ne nimet ne lanet, sadece doğanın standardı.

 carn_ext_fertility_high: "Yüksek Doğurganlık"
 carn_ext_fertility_high_desc: |
  Olağanüstü doğurgan — rahmi kolayca kıvılcım tutuşturur
  ve çocukları bol gelir. Hanedanlar böyle kadınlar üzerine inşa edilir.
  #newline
  #bold Doğurganlık:#! #positive +%20#!
  #newline
  #bold Hanedan Avantajı:#! Çekim #positive +5#!

 # ── LİBİDO ──────────────────────────────────────────────────────────────────

 carn_ext_libido_low: "Düşük Libido"
 carn_ext_libido_low_desc: |
  Bedensel zevklerin burada fazla etkisi yok.
  Bu karakter aylarca yakınlık olmadan yaşayabilir
  ve neredeyse fark etmez.
  #newline
  #bold Sekssiz stres:#! #positive Azalmış#!

 carn_ext_libido_average: "Ortalama Libido"
 carn_ext_libido_average_desc: |
  Yakınlığa duyulan sağlıklı, dengeli bir iştah —
  ne takıntılı ne de ilgisiz.

 carn_ext_libido_high: "Yüksek Libido"
 carn_ext_libido_high_desc: |
  Bedensel zevke güçlü bir iştah. Uzun sekssizlik dönemleri
  bu karakterin ruhunu ve özgüvenini sarsmaya başlar.
  #newline
  #bold Sekssiz stres:#! #negative Arttı#!
  #newline
  #italic Ayyaş trait'iyle sinerji gösterir.#!

 carn_ext_libido_burning: "Yakıcı Arzu"
 carn_ext_libido_burning_desc: |
  Neredeyse zorlayıcı bir yakınlık açlığı. Düzenli tatmin olmadan
  bu karakter huysuz, dağınık ve pervasız kararlar almaya yatkın hale gelir.
  #newline
  #bold Aylık sekssiz stres:#! #negative Ciddi#!
  #newline
  #bold Dindarlık:#! #negative Yılda -%5#!
  #newline
  #negative Tatmin olmadığında aktif olarak partner arayabilir.#!

 # ── KOKU/FEROMONE ────────────────────────────────────────────────────────────

 carn_ext_pheromone_faint: "Hafif Aura"
 carn_ext_pheromone_faint_desc: |
  Neredeyse algılanamayan, ince bir doğal koku —
  ne dezavantaj ne de dikkat çekici bir özellik.
  #newline
  #italic "Onlarda bir şey var... tam olarak ne söyleyemiyorum."#!

 carn_ext_pheromone_normal: "Doğal Çekicilik"
 carn_ext_pheromone_normal_desc: |
  Başkalarının nedensizce çekici bulduğu,
  hoş ve doğal bir varlık. Neden çekici buldukları konusunda
  pek de kesin açıklamaları olmayabilir.
  #newline
  #bold Çekim:#! #positive +5#!

 carn_ext_pheromone_potent: "Güçlü Feromone"
 carn_ext_pheromone_potent_desc: |
  Neredeyse sarhoş edici bir doğal varlık. Bu karakterin yanında
  vakit geçirenler, aklın devre dışı bırakıldığı
  açıklanamaz bir çekim hisseder.
  #newline
  #bold Çekim:#! #positive +12#!
  #newline
  #bold Yakınlık Bonusu:#! Karşılaşma hesaplamalarında aktif.
  #newline
  #italic Bazen özel yaklaşım event'lerini tetikleyebilir.#!
