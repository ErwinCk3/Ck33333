# ==============================================================================

l_turkish:

 carn_ext.0201.t: "Beklenmedik Bir An"

 carn_ext.0201.desc_default: |
  Başta hiçbir şey değildi. Bir bakış, bir an fazla sürdü.
  Geçerken bir el koluna değdi — tesadüf, elbette.
  #newline#newline
  [Scope:carn_ext_affair_target.GetFirstName] gülümsedi.
  Sarayda birine sunulan, ölçülü ve cilalı gülümseme değildi bu.
  Başka bir şeydi. [Root.GetFirstName]'in akıldan önce
  bedenin bir yerinde hissettiği türden bir şey.
  #newline#newline
  [Root.GetFirstName] [Root.GetHisHer] eşiyle kaç yıldır evli.
  Bunun ne olduğunu biliyor.
  #newline#newline
  Soru şu: Ne yapacak bununla?

 carn_ext.0201.desc_pheromone: |
  [Root.GetFirstName] onu odanın karşısına çeken şeyin
  ne olduğunu söyleyemezdi. Tam olarak güzellik değildi —
  güzel olmasına karşın. Tam olarak zekâ değildi —
  keskin olmasına karşın.
  #newline#newline
  Hayvansal bir şeydi. Düşüncelerin önünden geçerek
  direkt kötü kararlar veren beyne giden bir şey.
  #newline#newline
  Çok yakın durdu. Bu kadar yakın durmamalıydı.

 carn_ext.0201.desc_old_friend: |
  [Root.GetFirstName] [Scope:carn_ext_affair_target.GetFirstName]'i yıllardır tanıyor.
  #newline#newline
  Bu anı bu kadar tuhaf kılan buydu belki.
  Burada yeni bir şey yoktu — aynı yüz, aynı ses,
  aynı kahkaha. Ama bu gece, bu ışıkta, bir şeyler farklıydı.
  #newline#newline
  [Root.GetFirstName] ne zaman değiştiğini merak etti.
  Belki hep oradaydı, arka planda kibarca bekliyordu.

 carn_ext.0201.avoid: "Hayır. Bu yanlış ve biliyorum."
 carn_ext.0201.continue: "Hissettiğimi görmezden gelemiyorum."
 carn_ext.0201.lustful: "Buna hayır demekte hiç iyi olmadım."

 carn_ext.0202.t: "Bir Mektup"

 carn_ext.0202.desc_default: |
  Not küçük katlanmış geldi, okuma masasına bırakılan
  bir kitabın içine sıkıştırılmıştı.
  [Root.GetFirstName] neredeyse gözden kaçırıyordu.
  #newline#newline
  El yazısı [Scope:carn_ext_affair_target.GetHisHer]di.
  Mesaj kısaydı — bir saat, bir yer.
  Başkası okusaydı suç unsuru yoktu.
  Ama [Root.GetFirstName] anladı.
  #newline#newline
  Eşi yan odadaydı.

 carn_ext.0202.reject: "Bunu yakacak ve hiç gelmemiş gibi davranacağım."
 carn_ext.0202.reply: "Tek bir yanıt. Hepsi bu."
 carn_ext.0202.invite: "Bu gece gel."

 carn_ext.0203.t: "Kapı Kapandı"

 carn_ext.0203.desc_default: |
  [Root.GetFirstName] evliydi.
  Paylaşılan bir yatak, bir hane, her istenen görevin yerine getirilmesi.
  #newline#newline
  Bu farklıydı.
  #newline#newline
  Kapı arkalarında kapandığında [Root.GetFirstName],
  yaptığının tam ağırlığını hissetti — ve durmadı.
  #newline#newline
  [Scope:carn_ext_affair_target.GetFirstName] oradaydı.
  Bu yeterliydi. Her şeydi.

 carn_ext.0203.transcendent: "Bu neydi? Bu gece bana ne oldu?"
 carn_ext.0203.deeply: "Bunu tekrar yaşamak istiyorum."
 carn_ext.0203.satisfied: "Neden yaptığımı şimdi anlıyorum."
 carn_ext.0203.regret: "Bu bir hataydı. Tekrarlanmayacak."
 carn_ext.0203.default: "Oldu. Bitti."

 carn_ext.0204.t: "Başka Bir Gece"

 carn_ext.0204.desc_early: |
  Bir ay geçmişti ilk seferden beri.
  [Root.GetFirstName] kendine bunun bittiğini söylemişti.
  #newline#newline
  Ve işte yine buradaydı.
  #newline#newline
  [Scope:carn_ext_affair_target.GetFirstName] kapıyı açtı —
  [Root.GetFirstName] daha kapıyı çalmamıştı.
  Sanki bekliyordu. Sanki [Root.GetFirstName]'in
  olduğu yer burasıydı, bazı akşamlar.

 carn_ext.0204.desc_growing: |
  Artık bir ritim oluşmuştu. Küçük sinyallerin bir dili —
  akşam yemeğinde belirli bir bakış,
  odadan ayrılmanın belirli bir yolu.
  #newline#newline
  [Root.GetFirstName] yalan söylemeyi öğreniyordu.
  Kelimelerle değil — orada dikkatli davranıyordu.
  Ama sessizlikle. Yoklukla.

 carn_ext.0204.desc_deep: |
  [Root.GetFirstName] artık bunun tesadüfi olduğunu
  kendine kanıtlamaya çalışmıyordu.
  #newline#newline
  [Scope:carn_ext_affair_target.GetFirstName] ile geçen akşamlar
  gerçek olanlar haline gelmişti.
  Diğer her şey — saray, danışma kurulu, evlilik —
  tiyatro havası almıştı.

 carn_ext.0204.continue: "Bu beni değiştiriyor. Umursamıyorum."
 carn_ext.0204.end: "Beni yok etmeden önce bitirmeliyim."

 carn_ext.0205.t: "Planladığımdan Fazlası"

 carn_ext.0205.desc: |
  [Root.GetFirstName] başlangıçta kendine basit bir şey olduğunu söylemişti.
  Fiziksel. Sınırlı. Yalnızca belirli saatlerde var olan
  ve dışında hiçbir anlam taşımayan bir şey.
  #newline#newline
  Danışma sırasında [Scope:carn_ext_affair_target.GetFirstName]'i düşünüyordu.
  Yemekler sırasında. Uykudan önce geçen saatte.
  #newline#newline
  Görünüşe göre basit değildi.

 carn_ext.0205.accept: "Bu artık sadece zevk değil. Bunu biliyorum artık."
 carn_ext.0205.scared: "Bu çok ileri gitti. Bitirmeliyim."

 carn_ext.0210.t: "Şüpheli Gözler"

 carn_ext.0210.desc: |
  [Root.GetFirstName] ilk önce küçük bir şeyde fark etti.
  #newline#newline
  Eşi, belirli bir akşam nerede olduğunu çok dalgın sordu.
  Cevap hazırdı — makul, ayrıntılı, hazırlanmış
  ama hazırlanmış gibi görünmeden.
  #newline#newline
  Ama soru asılı kaldı. Ve eşin soruş biçimi —
  gözler biraz fazla sabit, ses biraz fazla kontrollü.
  #newline#newline
  [Root.GetFirstName] o bakışı tanıyor. Kendisi de takmıştır.

 carn_ext.0210.hide: "Daha dikkatli olmam gerekiyor."
 carn_ext.0210.confess: "Daha kötüleşmeden itiraf etmeliyim."
 carn_ext.0210.end_affair: "Yakalanmadan şimdi bitirmek daha iyi."

 carn_ext.0211.t: "Ortaya Çıktı"

 carn_ext.0211.desc: |
  [Root.GetFirstName] eşinin yüzündeki ifadeyi
  yaşadığı sürece unutmayacak.
  #newline#newline
  Öfke değildi — tam olarak değil. Öfke daha kolay olurdu.
  Bu, öfkenin ötesine geçmiş, çok daha sessiz
  ve çok daha kalıcı bir şeydi.
  #newline#newline
  Hayal kırıklığı. Yas. Uzun süredir şüphelenip
  istemediği teyidi sonunda alan birinin yüz ifadesi.

 carn_ext.0211.deny: "Her şeyi inkâr edeceğim."
 carn_ext.0211.confess: "Evet. Doğru. Üzgünüm."
 carn_ext.0211.defiant: "Pişman olmadığım bir şey için pişman görünmeyeceğim."

 carn_ext.0212.t: "Bir Karar"
 carn_ext.0212.desc: |
  İhanete ne yapar insan?
  Seçenekler var. Hiçbiri iyi değil.
 carn_ext.0212.ok: "Peki."

 carn_ext.0213.t: "Yüzleşme"

 carn_ext.0213.desc_default: |
  Kapı kapandı. Sessizlik mutlaktı.
  #newline#newline
  Eşi odanın karşısında duruyordu —
  bağırmıyordu, ki bu bir bakıma daha kötüydü.
  Sadece bakıyordu. Bekliyordu.
  #newline#newline
  [Root.GetFirstName] aynı anda hem dürüst hem merhametli olacak
  kelimeler bulmaya çalıştı.
  Bunlar yoktu. Bu durumda asla olmuyor.

 carn_ext.0213.desc_wrathful: |
  Eşi uzun süre sessiz kalmadı.
  #newline#newline
  Kelimeler dalgalar halinde geldi — sıcak, hassas, yıkıcı.
  Her başarısızlık. Her teyit edilen şüphe.
  Her gece [Root.GetFirstName]'in dönmesini beklediği
  ve kendine aptal görünmemesini söylediği her an.
  #newline#newline
  [Root.GetFirstName] bunu yaşamaya bıraktı.
  Bazı şeyler yanıtlanmak değil, atlatılmak zorundadır.

 carn_ext.0213.desc_calm: |
  En kötü yanı sakindi.
  #newline#newline
  Eşi oturdu. Ellerini kavuşturdu.
  Neredeyse hoş olan bir sesle konuştu.
  #newline#newline
  #italic "Ne kadar süredir olduğunu öğrenmek istiyorum."#!
  #newline#newline
  [Root.GetFirstName] cevapladı. Ve sorular sessizce
  ve sistematik olarak gelmeye devam etti.

 carn_ext.0213.apologize: "Özür dilerim. Gerçekten. Bir daha olmayacak."
 carn_ext.0213.justify: "Evliliğimizin ikimizin de istediği gibi olmadığını biliyorsun."
 carn_ext.0213.divorce: "Belki bu evliliği bitirmeliyiz."

 carn_ext.0214.t: "Saray Öğrendi"

 carn_ext.0214.desc: |
  Sabaha kadar her yere yayılmıştı.
  #newline#newline
  [Root.GetFirstName] bunu [Root.GetHeShe] bir odaya girdiğinde
  konuşmaların nasıl kesiliğinde görebiliyordu.
  Başka yöne kaçan gözlerde ya da daha kötüsü,
  alenen mahkûm edilmiş birine saklanan o merak
  ve küçümseme karışımıyla üstüne bakan gözlerde.

 carn_ext.0214.accept: "Başımı dik tutacağım. Başka seçeneğim yok."
 carn_ext.0214.shameless: "Bilsinler. Onların onayına hiç ihtiyacım olmadı."

 carn_ext.0220.t: "Bizim Sırrımız"

 carn_ext.0220.desc: |
  Sır onları yıkmadı. Aksine daha da yakınlaştırdı —
  paylaşılan riskin ve paylaşılan sessizliğin
  yarattığı o özel yakınlık.
  #newline#newline
  [Root.GetFirstName] o akşam bir ziyafette
  [Scope:carn_ext_affair_target.GetFirstName]'e baktı
  ve o odadaki başka kimsenin anlayamayacağı bir şey hissetti.

 carn_ext.0220.embrace: "Bu sır bizi birbirimize bağladı."
 carn_ext.0220.end: "Şansımız kalmadı. Temizce bitirelim."

 carn_ext.0221.t: "Bir Komplikasyon"

 carn_ext.0221.desc: |
  [Root.GetFirstName] sonuçları yeterince düşünmemişti.
  #newline#newline
  [Scope:carn_ext_affair_target.GetFirstName] bir şey söylemedi.
  Ama [Root.GetFirstName] hesabı yaptı —
  zamanlama, olasılık, bu özel durumun kendine özgü kırılganlığı.
  #newline#newline
  Eğer gebe kalırsa — ve kalabileceğine dair sebepler var —
  çocuk [Root.GetHisHer] olacak. İnkar edilemez, açıklanamaz biçimde.

 carn_ext.0221.worried: "Eğer gebe kalırsa... her şey çöker."
 carn_ext.0221.reckless: "Olan olsun. Geri alamam artık."
