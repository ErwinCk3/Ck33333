l_english:

 # ══════════════════════════════════════════════════════
 # carn_ext.0201 — İlk Kıvılcım
 # ══════════════════════════════════════════════════════

 carn_ext.0201.t: "An Unexpected Moment"

 carn_ext.0201.desc_default: |
  It was nothing, at first. A glance held a beat too long.
  A hand brushed against [Root.GetHisHer] arm in passing —
  an accident, surely.
  #newline#newline
  [Scope:carn_ext_affair_target.GetFirstName] smiled.
  Not the smile one offers at court, measured and polished.
  Something else. Something that [Root.GetFirstName] felt
  somewhere below rational thought.
  #newline#newline
  [Root.GetHeShe] has been married for [Root.GetYearsMarried] years.
  [Root.GetHeShe] knows what this is.
  #newline#newline
  The question is what [Root.GetHeShe] intends to do about it.

 carn_ext.0201.desc_pheromone: |
  [Root.GetFirstName] could not have said what drew [Root.GetHimHer]
  across the room. Not beauty, exactly — though
  [Scope:carn_ext_affair_target.GetFirstName] was beautiful.
  Not wit, though [Root.GetHeShe] was sharp enough.
  #newline#newline
  Something animal. Something that bypassed every sensible thought
  [Root.GetFirstName] had ever had and went straight
  to the part of the brain that makes bad decisions.
  #newline#newline
  [Root.GetHeShe] stood very close.
  [Root.GetHeShe] should not have stood so close.

 carn_ext.0201.desc_old_friend: |
  [Root.GetFirstName] has known
  [Scope:carn_ext_affair_target.GetFirstName] for years.
  #newline#newline
  That was, perhaps, what made this moment so strange.
  There was nothing new here — the same face, the same voice,
  the same laugh. And yet tonight, in this light,
  something was different.
  #newline#newline
  [Root.GetFirstName] wondered when it had changed.
  Whether it had always been there,
  waiting politely in the background.

 carn_ext.0201.avoid: "No. This is wrong, and I know it."
 carn_ext.0201.continue: "I cannot pretend I didn't feel that."
 carn_ext.0201.lustful: "I have never been good at saying no to this."

 # ══════════════════════════════════════════════════════
 # carn_ext.0202 — Gizli Mektup
 # ══════════════════════════════════════════════════════

 carn_ext.0202.t: "A Letter"

 carn_ext.0202.desc_default: |
  The note arrived folded small, tucked inside a book
  left on [Root.GetHisHer] reading table.
  [Root.GetFirstName] almost missed it.
  #newline#newline
  The handwriting was [Scope:carn_ext_affair_target.GetHisHer].
  The message was brief — a time, a place.
  Nothing incriminating, if someone else read it.
  But [Root.GetFirstName] understood.
  #newline#newline
  [Root.GetHisHer] spouse was in the next room.

 carn_ext.0202.desc_experienced: |
  [Scope:carn_ext_affair_target.GetFirstName] had done this before.
  That much was clear from the letter — precise, untraceable,
  warm without being reckless.
  #newline#newline
  A time. A place. A single line at the end:
  #newline
  #italic "I have been thinking about you."#!
  #newline#newline
  [Root.GetFirstName] read it three times.
  Then read it once more.

 carn_ext.0202.desc_innocent: |
  The letter was not subtle. That was almost charming —
  [Scope:carn_ext_affair_target.GetFirstName] had written it
  with all the caution of someone who had never done
  anything like this before.
  #newline#newline
  It was earnest. Clumsy. Somehow that made it worse.
  Or better. [Root.GetFirstName] could not decide.

 carn_ext.0202.reject: "I will burn this and pretend it never arrived."
 carn_ext.0202.reply: "One reply. That is all."
 carn_ext.0202.invite: "Come tonight."

 # ══════════════════════════════════════════════════════
 # carn_ext.0203 — İlk Gece
 # ══════════════════════════════════════════════════════

 carn_ext.0203.t: "The Door Closes"

 carn_ext.0203.desc_default: |
  [Root.GetFirstName] has been married.
  [Root.GetHeShe] has shared a bed, kept a household,
  performed every duty asked of [Root.GetHimHer].
  #newline#newline
  This was different.
  #newline#newline
  When the door closed behind them, [Root.GetFirstName] felt
  the full weight of what [Root.GetHeShe] was doing —
  and did not stop.
  #newline#newline
  [Scope:carn_ext_affair_target.GetFirstName] was there.
  That was enough. That was everything.

 carn_ext.0203.desc_legendary: |
  [Root.GetFirstName] had heard things. Rumours — the kind
  that circulate in hushed voices at banquets, trading glances
  over wine.
  #newline#newline
  [Root.GetHeShe] had not believed them. Not entirely.
  #newline#newline
  [Root.GetHeShe] believed them now.

 carn_ext.0203.desc_libertine_partner: |
  [Scope:carn_ext_affair_target.GetFirstName] knew exactly
  what [Root.GetHeShe] was doing. Every moment.
  [Root.GetHeShe] made no secret of it.
  #newline#newline
  [Root.GetFirstName] had thought [Root.GetHeShe] was experienced.
  [Root.GetHeShe] revised that assessment considerably
  before the night was over.

 carn_ext.0203.desc_first_time_affair: |
  [Root.GetFirstName]'s hands were not entirely steady.
  #newline#newline
  This was not the first time — there had been a wedding night,
  and nights after that. But those had been duty.
  Obligation. Something to be completed correctly.
  #newline#newline
  This was something else. This was chosen.
  And that made it feel entirely different.

 carn_ext.0203.transcendent: "What was that? What just happened to me?"
 carn_ext.0203.deeply: "I want to do that again. Soon."
 carn_ext.0203.satisfied: "Now I understand why I did this."
 carn_ext.0203.regret: "This was a mistake. It will not happen again."
 carn_ext.0203.default: "It happened. It is done."

 # ══════════════════════════════════════════════════════
 # carn_ext.0204 — Aktif İlişki
 # ══════════════════════════════════════════════════════

 carn_ext.0204.t: "Another Night"

 carn_ext.0204.desc_early: |
  A month had passed since the first time.
  [Root.GetFirstName] had told [Root.GetHimHer]self it was finished.
  #newline#newline
  Here [Root.GetHeShe] was again.
  #newline#newline
  [Scope:carn_ext_affair_target.GetFirstName] opened the door
  before [Root.GetHeShe] had even knocked. As if [Root.GetHeShe]
  had been expected. As if this were simply
  where [Root.GetFirstName] belonged, some evenings.

 carn_ext.0204.desc_growing: |
  They had developed a rhythm by now. A language of small signals —
  a certain look at dinner, a particular way of leaving a room.
  #newline#newline
  [Root.GetFirstName] was becoming very good at lying.
  Not with words — [Root.GetHeShe] was careful with words.
  But with silence. With absence.
  With the smile [Root.GetHeShe] gave [Root.GetHisHer] spouse
  that meant nothing at all.

 carn_ext.0204.desc_deep: |
  [Root.GetFirstName] no longer pretended this was casual.
  #newline#newline
  The evenings with [Scope:carn_ext_affair_target.GetFirstName]
  had become the real ones. Everything else —
  court, council, marriage — had taken on the quality of theatre.
  A performance [Root.GetHeShe] delivered convincingly
  because [Root.GetHeShe] had to.
  #newline#newline
  That was probably dangerous. [Root.GetFirstName] noted it
  and did not change course.

 carn_ext.0204.continue: "This is changing me. I'm not sure I mind."
 carn_ext.0204.end: "I need to end this before it ends me."

 # ══════════════════════════════════════════════════════
 # carn_ext.0205 — Derinleşen İlişki
 # ══════════════════════════════════════════════════════

 carn_ext.0205.t: "More Than I Planned"

 carn_ext.0205.desc: |
  [Root.GetFirstName] had told [Root.GetHimHer]self, at the beginning,
  that this was a simple thing. Physical. Contained.
  Something that existed only in those particular hours
  and meant nothing outside them.
  #newline#newline
  [Root.GetHeShe] thought about
  [Scope:carn_ext_affair_target.GetFirstName] at council.
  During meals. In the hour before sleep.
  #newline#newline
  It was not, apparently, simple.
  #newline#newline
  [Scope:carn_ext_affair_target.GetFirstName] looked at
  [Root.GetHimHer] tonight as if [Root.GetHeShe] felt the same.
  Probably [Root.GetHeShe] did. That was either
  very good or very bad news.

 carn_ext.0205.accept: "This is not just pleasure anymore. I know that now."
 carn_ext.0205.scared: "This has gone too far. I have to end it."

 # ══════════════════════════════════════════════════════
 # carn_ext.0210 — Eş Şüpheleniyor
 # ══════════════════════════════════════════════════════

 carn_ext.0210.t: "Suspicious Eyes"

 carn_ext.0210.desc: |
  [Root.GetFirstName] noticed it first in a small thing.
  #newline#newline
  [Root.GetHisHer] spouse asked, very casually,
  where [Root.GetHeShe] had been on a particular evening.
  The answer was prepared — plausible, detailed, rehearsed
  without appearing to be rehearsed.
  #newline#newline
  But the question lingered. And the way
  [Root.GetHisHer] spouse had asked it —
  eyes just slightly too steady,
  voice just slightly too controlled.
  #newline#newline
  [Root.GetFirstName] knows that look.
  [Root.GetHeShe] has worn it [Root.GetHimHer]self.

 carn_ext.0210.hide: "I need to be more careful."
 carn_ext.0210.confess: "I should confess before this gets worse."
 carn_ext.0210.end_affair: "Better to end it now than be caught."

 # ══════════════════════════════════════════════════════
 # carn_ext.0211 — Eş Yakaladı
 # ══════════════════════════════════════════════════════

 carn_ext.0211.t: "Found Out"

 carn_ext.0211.desc: |
  [Root.GetFirstName] will not forget the expression on
  [Root.GetHisHer] spouse's face for as long as [Root.GetHeShe] lives.
  #newline#newline
  It was not anger — not exactly. Anger would have been easier.
  This was something that had moved beyond anger into something
  quieter and far more permanent.
  #newline#newline
  Disappointment. Grief. The specific look of someone who had
  suspected for a long time and had finally been
  given the confirmation they did not want.
  #newline#newline
  [Root.GetFirstName] stood very still and said nothing.
  There was nothing adequate to say.

 carn_ext.0211.deny: "I will deny everything."
 carn_ext.0211.confess: "Yes. It is true. I am sorry."
 carn_ext.0211.defiant: "I will not pretend to be sorry for something I am not."

 # ══════════════════════════════════════════════════════
 # carn_ext.0212 — Eşin Kararı (AI)
 # ══════════════════════════════════════════════════════

 carn_ext.0212.t: "A Decision"
 carn_ext.0212.desc: |
  What does one do with a betrayal?
  There are options. None of them are good.
 carn_ext.0212.ok: "Very well."

 # ══════════════════════════════════════════════════════
 # carn_ext.0213 — Yüzleşme
 # ══════════════════════════════════════════════════════

 carn_ext.0213.t: "The Confrontation"

 carn_ext.0213.desc_default: |
  The door closed. The silence was total.
  #newline#newline
  [Root.GetHisHer] spouse stood across the room —
  not shouting, which was somehow worse.
  Just looking. Waiting.
  #newline#newline
  [Root.GetFirstName] tried to find words that were
  honest and merciful at the same time.
  There were none. There are never any, for this.

 carn_ext.0213.desc_wrathful: |
  [Root.GetHisHer] spouse did not stay quiet for long.
  #newline#newline
  The words came in waves — hot, precise, devastating.
  Every failure. Every suspicion confirmed.
  Every night [Root.GetHeShe] had waited and wondered
  and told [Root.GetHimHer]self not to be foolish.
  #newline#newline
  [Root.GetFirstName] let it happen.
  Some things have to be survived, not answered.

 carn_ext.0213.desc_calm: |
  The worst part was the calm.
  #newline#newline
  [Root.GetHisHer] spouse sat down. Folded [Root.GetHisHer] hands.
  Spoke in a voice so level it was almost pleasant.
  #newline#newline
  #italic "I would like to know how long."#!
  #newline#newline
  [Root.GetFirstName] answered. And then the questions
  kept coming, quiet and methodical,
  until there was nothing left to hide.

 carn_ext.0213.apologize: "I am sorry. Truly. It will never happen again."
 carn_ext.0213.justify: "You know our marriage has not been what either of us wanted."
 carn_ext.0213.divorce: "Perhaps we should simply end this marriage."

 # ══════════════════════════════════════════════════════
 # carn_ext.0214 — İfşa
 # ══════════════════════════════════════════════════════

 carn_ext.0214.t: "The Court Knows"

 carn_ext.0214.desc: |
  By morning, it was everywhere.
  #newline#newline
  [Root.GetFirstName] could see it in the way conversations
  stopped when [Root.GetHeShe] entered a room.
  In the eyes that slid away, or worse, held on too long
  with that particular mixture of fascination and contempt
  that courts reserve for the publicly disgraced.
  #newline#newline
  [Root.GetHisHer] spouse had spoken. To whom, and how much,
  [Root.GetFirstName] did not yet know.
  But the damage was visible in every face.

 carn_ext.0214.accept: "I will hold my head up. I have no other choice."
 carn_ext.0214.shameless: "Let them know. I have never needed their approval."

 # ══════════════════════════════════════════════════════
 # carn_ext.0220 — Gizli Kaldı
 # ══════════════════════════════════════════════════════

 carn_ext.0220.t: "Our Secret"

 carn_ext.0220.desc: |
  The secret had not broken them. If anything, it had
  drawn them closer — that particular intimacy of
  shared risk, shared silence.
  #newline#newline
  [Root.GetFirstName] looked at
  [Scope:carn_ext_affair_target.GetFirstName] across the room
  at a banquet that evening and felt something
  [Root.GetHeShe] had almost forgotten it was possible to feel.
  #newline#newline
  No one else in the room knew. That made it
  both unbearable and extraordinary.

 carn_ext.0220.embrace: "This secret has made us something to each other."
 carn_ext.0220.end: "Our luck will not hold. Better to end it cleanly."

 # ══════════════════════════════════════════════════════
 # carn_ext.0221 — Bastard Riski
 # ══════════════════════════════════════════════════════

 carn_ext.0221.t: "A Complication"

 carn_ext.0221.desc: |
  [Root.GetFirstName] had not thought carefully enough
  about consequences.
  #newline#newline
  [Scope:carn_ext_affair_target.GetFirstName] has said nothing.
  But [Root.GetFirstName] has done the arithmetic —
  the timing, the likelihood, the particular vulnerability
  of this particular situation.
  #newline#newline
  If she were to conceive — and there is reason to believe
  she might — the child would be [Root.GetHisHer].
  Indisputably, uncomplicatedly [Root.GetHisHer].
  #newline#newline
  And there would be no quiet way to explain that.

 carn_ext.0221.worried: "If she conceives, everything falls apart."
 carn_ext.0221.reckless: "Whatever happens, happens. I cannot take it back."
