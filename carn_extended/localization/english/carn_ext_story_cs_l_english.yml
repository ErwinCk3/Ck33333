l_english:

 # ══════════════════════════════════════════════════════
 # carn_ext.0601 — Tesadüfi Keşif
 # ══════════════════════════════════════════════════════

 carn_ext.0601.t: "What Should Not Have Been Seen"

 carn_ext.0601.desc: |
  [Root.GetFirstName] had taken a wrong turning —
  a servant's passage, a corridor [Root.GetHeShe] rarely used.
  #newline#newline
  The door at the end was ajar. The sound that reached
  [Root.GetHimHer] stopped [Root.GetHimHer] in [Root.GetHisHer] tracks.
  #newline#newline
  [Scope:carn_ext_cs_male_id.GetFirstName] and
  [Scope:carn_ext_cs_female_id.GetFirstName].
  #newline#newline
  [Root.GetFirstName] stood very still and processed
  what [Root.GetHeShe] was seeing with the careful
  thoroughness of someone who understands that information,
  once acquired, becomes a resource.

 carn_ext.0601.slip_away: "I saw nothing. I was never here."
 carn_ext.0601.watch: "I stayed. I watched. I could not look away."
 carn_ext.0601.decide: "This is useful. The question is how useful."

 # ══════════════════════════════════════════════════════
 # carn_ext.0602 — Hizmetkar Söyledi
 # ══════════════════════════════════════════════════════

 carn_ext.0602.t: "Servants Talk"

 carn_ext.0602.desc: |
  The servant had been nervous. That was the first sign
  that this was genuine — people performing rumours
  don't usually tremble.
  #newline#newline
  [Scope:carn_ext_cs_male_id.GetFirstName] and
  [Scope:carn_ext_cs_female_id.GetFirstName].
  For months, apparently. In plain sight
  of everyone who had been paying attention,
  which was everyone except the relevant spouses.
  #newline#newline
  [Root.GetFirstName] dismissed the servant
  and sat with this new knowledge for a moment.
  It was, [Root.GetHeShe] thought, a rather interesting morning.

 carn_ext.0602.dismiss: "Gossip is beneath me. Let it go."
 carn_ext.0602.verify: "I want to verify this before I act."
 carn_ext.0602.use: "What can I do with this?"

 # ══════════════════════════════════════════════════════
 # carn_ext.0603 — Casuslukla Keşif
 # ══════════════════════════════════════════════════════

 carn_ext.0603.t: "Intelligence"

 carn_ext.0603.desc: |
  The report landed on [Root.GetFirstName]'s desk
  with the quiet efficiency of good intelligence work —
  names, dates, locations, the particular chamber on the eastern
  corridor that [Scope:carn_ext_cs_male_id.GetFirstName]
  visited on certain evenings, and who was waiting there.
  #newline#newline
  [Scope:carn_ext_cs_female_id.GetFirstName].
  #newline#newline
  [Root.GetFirstName] read the report twice.
  Noted it was thorough. Made a decision about
  what it was worth.

 carn_ext.0603.file_away: "Useful. Filed away for the appropriate moment."
 carn_ext.0603.ignore: "Not my concern."

 # ══════════════════════════════════════════════════════
 # carn_ext.0604 — Ne Yapacaksın?
 # ══════════════════════════════════════════════════════

 carn_ext.0604.t: "A Question of Use"

 carn_ext.0604.desc_default: |
  [Root.GetFirstName] knew what [Scope:carn_ext_cs_male_id.GetFirstName]
  and [Scope:carn_ext_cs_female_id.GetFirstName]
  were doing. That made [Root.GetHimHer] powerful.
  #newline#newline
  The question was what to do with that power.

 carn_ext.0604.desc_witnessed: |
  The image was still vivid.
  [Scope:carn_ext_cs_male_id.GetFirstName] and
  [Scope:carn_ext_cs_female_id.GetFirstName] —
  and [Root.GetFirstName], unseen in the doorway,
  watching things that were not meant for [Root.GetHisHer] eyes.
  #newline#newline
  [Root.GetHeShe] could still feel [Root.GetHisHer] pulse.
  That was relevant information about what [Root.GetHeShe] intended to do.

 carn_ext.0604.desc_spy: |
  The intelligence was solid. Verified. Actionable.
  [Root.GetFirstName] had built a career on knowing
  when to use information and when to let it sit.
  #newline#newline
  This felt like a moment for use.

 carn_ext.0604.report: "Report it. Let justice take its course."
 carn_ext.0604.blackmail: "Their secret has a price."
 carn_ext.0604.keep_secret: "I will say nothing. But they will owe me."
 carn_ext.0604.join: "I want in."

 # ══════════════════════════════════════════════════════
 # carn_ext.0605 — İhbar
 # ══════════════════════════════════════════════════════

 carn_ext.0605.t: "Justice"

 carn_ext.0605.desc: |
  [Root.GetFirstName] went to the appropriate authority
  and told the truth. Simply, completely, without embellishment.
  #newline#newline
  The consequences moved with the implacable efficiency
  of institutions that have been doing this for centuries.
  [Scope:carn_ext_cs_male_id.GetFirstName] and
  [Scope:carn_ext_cs_female_id.GetFirstName]
  were summoned. Questioned. Penalised.
  #newline#newline
  [Root.GetFirstName] watched and felt something —
  satisfaction, partly. But something else too.
  Something that looked, uncomfortably, like the other side of envy.

 carn_ext.0605.righteous: "The right thing was done."
 carn_ext.0605.regret: "Perhaps I was too harsh."

 # ══════════════════════════════════════════════════════
 # carn_ext.0606 — Şantaj
 # ══════════════════════════════════════════════════════

 carn_ext.0606.t: "The Price of Silence"

 carn_ext.0606.desc: |
  [Root.GetFirstName] arranged the meeting carefully —
  a private room, a specific hour, the kind of deliberate
  staging that makes clear a message has been thought through.
  #newline#newline
  [Scope:carn_ext_cs_male_id.GetFirstName] sat across the table
  and understood immediately. [Root.GetFirstName] could see
  the calculation happening behind [Root.GetHisHer] eyes —
  the rapid inventory of options, the recognition
  that there were fewer than [Root.GetHeShe] would have liked.
  #newline#newline
  "What do you want?" [Root.GetHeShe] asked.
  Very controlled. Almost calm.
  #newline#newline
  [Root.GetFirstName] had prepared the answer.

 carn_ext.0606.money: "Your silence has a price. Pay it."
 carn_ext.0606.favor: "I do not want money. I want a favour, to be named later."
 carn_ext.0606.want_woman: "I want her. Keep your distance — and I keep your secret."

 # ══════════════════════════════════════════════════════
 # carn_ext.0607 — Sır Ortağı
 # ══════════════════════════════════════════════════════

 carn_ext.0607.t: "Keeper of Secrets"

 carn_ext.0607.desc: |
  [Root.GetFirstName] told them both together.
  Easier that way — no version of events, no asymmetry.
  Just the plain statement: [Root.GetHeShe] knew.
  [Root.GetHeShe] had known for some time. And [Root.GetHeShe]
  intended to say nothing, to nobody, for no reward.
  #newline#newline
  The silence that followed was rather long.
  #newline#newline
  [Scope:carn_ext_cs_female_id.GetFirstName] spoke first:
  "Why?"
  #newline#newline
  [Root.GetFirstName] considered the honest answer —
  that [Root.GetHeShe] had once wanted something
  no one gave [Root.GetHimHer], and had learned to recognise it
  in others — and gave a simpler one instead.
  #newline#newline
  "Because some things should be allowed to exist."

 carn_ext.0607.accept: "Your secret is safe with me."

 # ══════════════════════════════════════════════════════
 # carn_ext.0608 — Katılım: Üçlü
 # ══════════════════════════════════════════════════════

 carn_ext.0608.t: "An Invitation"

 carn_ext.0608.desc: |
  [Root.GetFirstName] had been direct. There was no elegant way
  to phrase it, so [Root.GetHeShe] did not try.
  #newline#newline
  The silence was very long.
  #newline#newline
  [Scope:carn_ext_cs_male_id.GetFirstName] and
  [Scope:carn_ext_cs_female_id.GetFirstName] looked at each other —
  the look of two people who have been together long enough
  to have entire conversations without language.
  #newline#newline
  Then [Scope:carn_ext_cs_female_id.GetFirstName] looked at
  [Root.GetFirstName] with an expression that was
  not quite a smile but was related to one.
  #newline#newline
  "Close the door," she said.

 carn_ext.0608.threesome: "The door closed. The night began."
 carn_ext.0608.decline: "On reflection — no. This is not what I want."

 # ══════════════════════════════════════════════════════
 # carn_ext.0609 — Kadını Çal
 # ══════════════════════════════════════════════════════

 carn_ext.0609.t: "Mine Now"

 carn_ext.0609.desc_default: |
  The night had begun as something shared.
  [Root.GetFirstName] found, as it progressed, that
  sharing was not what [Root.GetHeShe] wanted.
  #newline#newline
  [Scope:carn_ext_cs_female_id.GetFirstName] was —
  there was no measured way to say this — extraordinary.
  And [Root.GetFirstName] had reached a point of the evening
  at which measurement had become irrelevant.

 carn_ext.0609.desc_steal: |
  [Root.GetFirstName] turned to
  [Scope:carn_ext_cs_male_id.GetFirstName]
  and said, with perfect clarity:
  #newline
  #italic "She's mine now. Watch, or leave. Your choice."#!
  #newline#newline
  The expression on his face was —
  [Root.GetFirstName] would remember it.
  Rage, mostly. And underneath the rage, something
  that was not quite the opposite of desire.
  #newline#newline
  He stayed.

 carn_ext.0609.continue_threesome: "Tonight was enough for everyone."
 carn_ext.0609.steal_her: "I want her alone. You — step aside."

 # ══════════════════════════════════════════════════════
 # carn_ext.0610 — Önünde — Humiliation
 # ══════════════════════════════════════════════════════

 carn_ext.0610.t: "Watch"

 carn_ext.0610.desc_transcendent: |
  [Scope:carn_ext_cs_female_id.GetFirstName] had stopped
  paying attention to anyone else in the room.
  That was the clearest measure of the night —
  the point at which she forgot to perform, forgot to manage,
  and simply was present with [Root.GetFirstName]
  with an intensity that excluded everything else.
  #newline#newline
  [Scope:carn_ext_cs_male_id.GetFirstName] watched
  from across the room. [Root.GetFirstName] was aware of this
  in the detached, unhurried way one is aware of furniture.

 carn_ext.0610.desc_deeply: |
  [Root.GetFirstName] did not look at
  [Scope:carn_ext_cs_male_id.GetFirstName] once.
  That was intentional. The message needed no elaboration.
  #newline#newline
  [Scope:carn_ext_cs_female_id.GetFirstName]'s attention,
  her entire attention, was here.
  That was what [Root.GetFirstName] had wanted.
  That was what [Root.GetHeShe] had.

 carn_ext.0610.desc_default: |
  The room contained three people.
  Only two of them mattered to each other by now.
  The third had become, through no act of violence,
  simply a witness to something from which
  [Root.GetHeShe] was entirely excluded.
  #newline#newline
  [Root.GetFirstName] understood the particular
  cruelty of this. That was why [Root.GetHeShe] had done it.

 carn_ext.0610.send_away: "You can leave now."
 carn_ext.0610.force_watch: "Stay. You will watch all of it."

 # ══════════════════════════════════════════════════════
 # carn_ext.0611 — İntikam
 # ══════════════════════════════════════════════════════

 carn_ext.0611.t: "Consequences"

 carn_ext.0611.desc: |
  [Root.GetFirstName] had understood this was a possibility.
  Some things cannot be done to a person without
  that person eventually finding a way to respond.
  #newline#newline
  [Scope:carn_ext_cs_male_id.GetFirstName] had found a way.
  It was not elegant, but it was effective.
  [Root.GetFirstName] would give [Root.GetHimHer] that.

 carn_ext.0611.accept: "I accept the cost. It was worth it."
 carn_ext.0611.counter: "Two can play at this."

 # ══════════════════════════════════════════════════════
 # carn_ext.0612 — Skandal Sürüklendi
 # ══════════════════════════════════════════════════════

 carn_ext.0612.t: "Caught in the Current"

 carn_ext.0612.desc: |
  The scandal, when it broke, was larger than expected.
  These things tend to be.
  #newline#newline
  [Root.GetFirstName]'s name had surfaced in the questions —
  someone had talked, or someone had guessed, or someone
  had simply noticed that [Root.GetFirstName] had not been
  nearly as surprised as [Root.GetHeShe] should have been.
  #newline#newline
  Now [Root.GetFirstName] was part of it.
  Not at the centre — but close enough
  to feel the heat.

 carn_ext.0612.deny: "I knew nothing. I was as surprised as anyone."
 carn_ext.0612.accept: "Yes, I knew. I made a choice. I stand by it."
