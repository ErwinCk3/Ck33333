 # ══════════════════════════════════════════════════════
 # carn_ext.0401 — Kapı Açıldı
 # ══════════════════════════════════════════════════════

 carn_ext.0401.t: "Something in the Dark"

 carn_ext.0401.desc: |
  The hour was deep — the kind of dark that comes only in the
  middle of the night, when even the watchmen nod and
  the torches burn low.
  #newline#newline
  [Root.GetFirstName] was not asleep.
  Sleep had been elusive lately, circling just out of reach,
  and [Root.GetHeShe] had been lying in the particular stillness
  of someone waiting for nothing.
  #newline#newline
  Then the door moved.
  #newline#newline
  Slowly. Without a sound. The way a door moves when someone
  has been very careful, for a very long time, about how to open it.
  #newline#newline
  Someone was in the room.

 carn_ext.0401.shout: "Who is there! Guards!"
 carn_ext.0401.wait: "I did not move. I lay still and listened."
 carn_ext.0401.weapon: "My hand found the dagger beneath the pillow."
 carn_ext.0401.greet: "Whoever you are — come in."

 # ══════════════════════════════════════════════════════
 # carn_ext.0402 — Karanlıkta
 # ══════════════════════════════════════════════════════

 carn_ext.0402.t: "No Light"

 carn_ext.0402.desc_default: |
  [Root.GetFirstName] could not see.
  #newline#newline
  The fire had burned to coals — enough warmth, not enough light.
  There was a presence. A shape. A sound of breathing
  that was not [Root.GetHisHer] own.
  #newline#newline
  Not a threat — or if it was, it was an unusually
  patient one. Whatever was in the room had stopped moving
  and was simply standing there, in the dark,
  as if waiting to be acknowledged.
  #newline#newline
  [Root.GetFirstName] could feel the distance between them.
  Could feel it shrinking.

 carn_ext.0402.desc_armed: |
  The dagger was in [Root.GetHisHer] hand.
  For a long moment, [Root.GetFirstName] held it —
  ready, steady, pointed at nothing in particular.
  #newline#newline
  The figure in the dark did not flee.
  Did not attack.
  #newline#newline
  Instead, very slowly, [Root.GetHeShe] set something down —
  a sound of fabric, a whisper of movement —
  and sat on the edge of the bed. As if [Root.GetHeShe]
  had been invited. As if [Root.GetHeShe] belonged there.
  #newline#newline
  [Root.GetFirstName]'s grip on the dagger loosened.
  Then released.

 carn_ext.0402.desc_welcoming: |
  [Root.GetFirstName] had said come in and had meant it —
  had meant it the way one means things late at night
  when the guards are far away and consequence
  feels theoretical.
  #newline#newline
  The shadow moved toward [Root.GetHimHer] without hesitation.
  Close enough now that [Root.GetFirstName] could feel
  warmth, could smell something clean and faintly familiar —
  but still could not see.
  #newline#newline
  A hand found [Root.GetHisHer] own in the dark.
  Held it. Waited.

 carn_ext.0402.ask: "Tell me who you are."
 carn_ext.0402.accept: "It did not matter who it was. They were there. That was enough."
 carn_ext.0402.refuse: "No. Whoever you are — leave. Now."

 # ══════════════════════════════════════════════════════
 # carn_ext.0403 — Sabah Işığı
 # ══════════════════════════════════════════════════════

 carn_ext.0403.t: "First Light"

 carn_ext.0403.desc_spouse: |
  The first grey light came through the shutters
  in thin strips, slow and inevitable.
  #newline#newline
  [Root.GetFirstName] turned.
  #newline#newline
  [Primary_Spouse.GetFirstName].
  #newline#newline
  [Primary_Spouse.GetHisHer] eyes were already open —
  watching [Root.GetHimHer] with an expression that was
  difficult to read. Something between amusement and
  something far more serious.
  #newline#newline
  "You did not know," [Root.GetHeShe] said quietly.
  It was not a question.
  #newline#newline
  [Root.GetFirstName] thought about all the years of their marriage.
  The distance, the duty, the long silences.
  The nights when [Root.GetHeShe] had gone to sleep on
  [Root.GetHisHer] side of the bed and not moved.
  #newline#newline
  "No," [Root.GetFirstName] said. "I didn't know."
  #newline#newline
  [Primary_Spouse.GetFirstName] smiled. Slow, quiet, real.
  "Good," [Root.GetHeShe] said. "That was the point."

 carn_ext.0403.desc_servant: |
  Light came. And with it, recognition.
  #newline#newline
  [Root.GetFirstName] stared at the face on the pillow
  and went through a complicated sequence of emotions
  in rapid succession.
  #newline#newline
  A member of [Root.GetHisHer] own household.
  Someone who had poured [Root.GetHisHer] wine,
  stood quietly at [Root.GetHisHer] back through council meetings,
  been invisible the way well-trained servants are invisible.
  #newline#newline
  Not invisible now.
  #newline#newline
  [Scope:carn_ext_nv_revealed.GetFirstName] met
  [Root.GetHisHer] gaze without flinching.
  Without apology. With something that might have been
  a challenge, or might have been an offer.
  #newline#newline
  "My lord," [Root.GetHeShe] said, voice absolutely level.
  "Good morning."

 carn_ext.0403.desc_rival: |
  [Root.GetFirstName] had made mistakes before.
  Political miscalculations. Tactical errors.
  Moments in council where [Root.GetHeShe] had read
  a room incorrectly.
  #newline#newline
  This was different. This was—
  #newline#newline
  [Scope:carn_ext_nv_revealed.GetFirstName].
  #newline#newline
  Of all the people in the court. Of all the faces
  [Root.GetFirstName] would have assembled
  in a list of possible visitors — this face would not
  have been on it. This face was an enemy.
  #newline#newline
  [Scope:carn_ext_nv_revealed.GetFirstName] sat up slowly,
  unhurried, and looked at [Root.GetHimHer]
  with an expression of perfect, calculated satisfaction.
  #newline#newline
  "Surprised?" [Root.GetHeShe] asked pleasantly.

 carn_ext.0403.desc_family: |
  [Root.GetFirstName] had known the truth
  before the light arrived.
  #newline#newline
  Some things are known through the body
  before the mind is willing to admit them.
  The particular way this person breathed.
  A gesture, seen a thousand times by firelight,
  that [Root.GetHeShe] had not registered until this moment.
  #newline#newline
  The light came anyway.
  Confirmed what [Root.GetFirstName] already knew.
  #newline#newline
  [Scope:carn_ext_nv_revealed.GetFirstName] was awake.
  They looked at each other for a long time
  without speaking. The room held its breath.

 carn_ext.0403.desc_stranger: |
  [Root.GetFirstName] did not know this face.
  #newline#newline
  Had seen it, perhaps — in a corridor, at a meal,
  one of the hundred faces that pass through a court
  without leaving much impression. But did not know it.
  #newline#newline
  [Scope:carn_ext_nv_revealed.GetFirstName] seemed
  entirely unbothered by this.
  [Root.GetHeShe] rose from the bed with quiet efficiency,
  located [Root.GetHisHer] clothes, began to dress —
  and then paused.
  #newline#newline
  Turned. Looked at [Root.GetFirstName] with
  a directness that was startling in someone
  whose name [Root.GetHeShe] still did not know.
  #newline#newline
  "You'll want to know who I am," [Root.GetHeShe] said.
  "Whether you ask is up to you."

 carn_ext.0403.spouse_touched: "You. All this time — it was you."
 carn_ext.0403.spouse_transcendent: "I have been married to you for years and never knew this."
 carn_ext.0403.spouse_surprised: "You. That was... you planned this?"
 carn_ext.0403.default: "Morning changed everything."

 # ══════════════════════════════════════════════════════
 # carn_ext.0408 — Hizmetkar Sonrası
 # ══════════════════════════════════════════════════════

 carn_ext.0408.t: "The Weight of What Was Done"

 carn_ext.0408.desc: |
  In the full light of day, with the business of court
  resuming around [Root.GetHimHer], [Root.GetFirstName]
  watched [Scope:carn_ext_nv_revealed.GetFirstName]
  move through the room.
  #newline#newline
  Invisible again. Professional. Every gesture correct,
  every movement properly subordinate.
  #newline#newline
  Except for one moment — just one — when
  [Scope:carn_ext_nv_revealed.GetFirstName]
  passed close by and looked up.
  #newline#newline
  That look. [Root.GetFirstName] would be thinking about
  that look for some time.

 carn_ext.0408.continue: "I know exactly who you are. Come back tonight."
 carn_ext.0408.distance: "This must not happen again."
 carn_ext.0408.threaten: "Not a word of this. Not to anyone. Ever."

 # ══════════════════════════════════════════════════════
 # carn_ext.0409 — Rakip Sonrası
 # ══════════════════════════════════════════════════════

 carn_ext.0409.t: "A Dangerous Game"

 carn_ext.0409.desc: |
  [Scope:carn_ext_nv_revealed.GetFirstName] had not left
  in haste. That was the first warning sign.
  #newline#newline
  [Root.GetHeShe] had dressed slowly, deliberately,
  with the unhurried manner of someone who has
  nowhere to be and nothing to fear.
  #newline#newline
  Before leaving, [Root.GetHeShe] had paused at the door
  and smiled — not warmly. Something sharper than warmth.
  #newline#newline
  "You should know," [Root.GetHeShe] had said,
  "that I remember everything."
  #newline#newline
  The door had closed. [Root.GetFirstName] had stood very still
  and understood, with cold clarity, exactly what had happened
  and exactly how much trouble [Root.GetHeShe] was in.

 carn_ext.0409.negotiate: "What do you want for your silence?"
 carn_ext.0409.eliminate: "This person cannot be allowed to speak."
 carn_ext.0409.accept_blackmail: "I have no choice."

 # ══════════════════════════════════════════════════════
 # carn_ext.0410 — Yabancı Sonrası
 # ══════════════════════════════════════════════════════

 carn_ext.0410.t: "A Name"

 carn_ext.0410.desc: |
  [Root.GetFirstName] did not know [Root.GetHisHer] name
  until mid-morning, when [Root.GetHeShe] heard it mentioned
  in passing by a steward.
  #newline#newline
  [Scope:carn_ext_nv_revealed.GetFirstName].
  #newline#newline
  Such an ordinary name for something so inexplicable.
  [Root.GetFirstName] turned it over in [Root.GetHisHer] mind
  and found it unsatisfying — a label that explained nothing,
  answered nothing, resolved nothing about the night.
  #newline#newline
  Across the hall, [Scope:carn_ext_nv_revealed.GetFirstName]
  caught [Root.GetHisHer] eye and held it for exactly
  one second longer than a stranger should.
  #newline#newline
  [Root.GetFirstName] looked away first.

 carn_ext.0410.investigate: "I need to know who you are."
 carn_ext.0410.forget: "A name. That is all. It means nothing."
 carn_ext.0410.invite_again: "Come back."
