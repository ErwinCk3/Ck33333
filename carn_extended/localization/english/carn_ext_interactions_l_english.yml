l_english:

 # ── Interaction Adı & Açıklama ───────────────────────────────────────────────

 CARN_EXT_SPEND_NIGHT_NAME: "Spend the Night"
 CARN_EXT_SPEND_NIGHT_NAME_desc: |
  Invite [Scope:Recipient.GetFirstName] to spend
  the night with you.
  #newline
  #bold Cooldown:#! 1 day.

 # ── Yaklaşım Seçenekleri ─────────────────────────────────────────────────────

 CARN_EXT_APPROACH_ROMANTIC_OPTION: "Tenderly"
 CARN_EXT_APPROACH_ROMANTIC_OPTION_desc: "A gentle, romantic approach."

 CARN_EXT_APPROACH_DOMINANT_OPTION: "Dominantly"
 CARN_EXT_APPROACH_DOMINANT_OPTION_desc: "Make clear who is in charge."

 CARN_EXT_APPROACH_SUBMISSIVE_OPTION: "Submissively"
 CARN_EXT_APPROACH_SUBMISSIVE_OPTION_desc: "Offer yourself wholly to their will."

 # ── Mesajlar ─────────────────────────────────────────────────────────────────

 CARN_EXT_SPEND_NIGHT_ACTOR_MSG: |
  You invited [Scope:Recipient.GetFirstName]
  to spend the night with you.

 CARN_EXT_SPEND_NIGHT_RECIPIENT_MSG: |
  [Scope:Actor.GetFirstName] has invited you
  to spend the night together.

 CARN_EXT_SPEND_NIGHT_DECLINE_MSG: |
  [Scope:Recipient.GetFirstName] declined
  your invitation.

 # ── Kabul / Red Bildirimleri ─────────────────────────────────────────────────

 CARN_EXT_SPEND_NIGHT_ACCEPT_NOTIFICATION: |
  [Scope:Recipient.GetFirstName] accepted.

 CARN_EXT_SPEND_NIGHT_DECLINE_NOTIFICATION: |
  [Scope:Recipient.GetFirstName] declined.
