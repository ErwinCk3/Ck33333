 carn_ext_exp_rate_normal: "Normal"
 carn_ext_exp_rate_normal_desc: "Default progression speed."

 carn_ext_exp_rate_fast: "Fast"
 carn_ext_exp_rate_fast_desc: "Experience tiers unlock quickly. Better for shorter playthroughs."

 # ── PLEASURE SCORE ───────────────────────────────────────────────────────────

