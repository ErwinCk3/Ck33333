l_english:

 # ── İÇERİK SEVİYESİ ─────────────────────────────────────────────────────────

 carn_ext_content_level: "Content Level"
 carn_ext_content_level_desc: "Controls the explicitness of scene descriptions and dialogue."

 carn_ext_content_soft: "Tasteful"
 carn_ext_content_soft_desc: "Mechanics are active but scene text is kept brief and non-explicit. Dirty talk is disabled."

 carn_ext_content_full: "Full"
 carn_ext_content_full_desc: "All content enabled. Explicit scene descriptions, dirty talk, and full dialogue options."

 # ── FİZİKSEL TRAİT SİSTEMİ ──────────────────────────────────────────────────

 carn_ext_physical_traits: "Physical Trait System"
 carn_ext_physical_traits_desc: "Enables body trait assignment (size, build, bust, hips, etc.) for all characters."

 carn_ext_physical_on: "Enabled"
 carn_ext_physical_on_desc: "All physical traits are assigned at birth and affect gameplay."

 carn_ext_physical_off: "Disabled"
 carn_ext_physical_off_desc: "Physical traits are not assigned. Only Carnalitas base traits are used."

 # ── TRAİT GÖRÜNÜRLÜĞÜ ────────────────────────────────────────────────────────

 carn_ext_show_body_traits: "Trait Visibility"
 carn_ext_show_body_traits_desc: "Controls who can see physical trait icons in the character window."

 carn_ext_show_traits_all: "All Characters"
 carn_ext_show_traits_all_desc: "Physical traits are visible for all characters."

 carn_ext_show_traits_self: "Player Only"
 carn_ext_show_traits_self_desc: "Physical traits are only visible for your own character."

 carn_ext_show_traits_hidden: "Hidden"
 carn_ext_show_traits_hidden_desc: "Traits are active but not shown in the character window."

 # ── GENETİK MİRAS ────────────────────────────────────────────────────────────

 carn_ext_genetics: "Genetic Inheritance"
 carn_ext_genetics_desc: "How physical traits are passed from parents to children."

 carn_ext_genetics_realistic: "Realistic"
 carn_ext_genetics_realistic_desc: "Full inheritance engine. Father ~55%, mother carrier ~35%, grandparent effect ~10%. Regression to mean applies."

 carn_ext_genetics_simple: "Simple"
 carn_ext_genetics_simple_desc: "Traits are averaged from both parents with minor random variance. No grandparent effect."

 carn_ext_genetics_off: "Random"
 carn_ext_genetics_off_desc: "All traits are assigned randomly at birth, ignoring parentage."

 carn_ext_grandparent_effect: "Grandparent Effect"
 carn_ext_grandparent_effect_desc: "Allows traits to skip a generation — a grandfather's legendary size can occasionally appear in a grandson even if the father was average."

 carn_ext_grandparent_on: "Enabled"
 carn_ext_grandparent_off: "Disabled"

